spring:
  application:
    name: prompt-server

  data:
    mongodb:
      uri: mongodb+srv://promptvault_db_user:Y10UMwcRyfZV4wDg@cluster0.4yc47z.mongodb.net/promptdb?appName=Cluster0

server:
  port: 8080

app:
  jwt:
    # Change this to a long random string in production!
    secret: "promptvault-super-secret-key-change-me-in-production-min-32-chars"
    expiration-ms: 86400000   # 24 hours

  gemini:
    # Get your free API key at https://aistudio.google.com/apikey
    api-key: ${GEMINIAPIKEY:}
    base-url: "https://generativelanguage.googleapis.com"
    model: "gemini-2.5-pro"         # used for prompt optimisation (thinking model, thorough)
    fast-model: "gemini-2.5-flash"  # used for summaries (fast, no thinking overhead)

# CORS is configured in the WebConfig class — see config/WebConfig.java

logging:
  level:
    com.lafayette.promptserver: DEBUG
    org.springframework.data.mongodb: INFO
    # Suppress the harmless Atlas thread shutdown warnings from embedded Tomcat
    org.apache.catalina.loader.WebappClassLoaderBase: ERROR
